<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthPro · Login</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Google Font: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet" />
</head>
<body>

    <!-- ============================================================
    NAVBAR
    ============================================================ -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="bi bi-shield-lock-fill me-2"></i>AuthPro
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="register.html">Register</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ============================================================
LOGIN SECTION
============================================================ -->
<section class="login-section min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">

            <!-- Hero / Left Column -->
            <div class="col-lg-5 col-md-6 d-flex flex-column justify-content-center text-white mb-5 mb-md-0">
                <h1 class="display-4 fw-bold animate-slide-up">Welcome Back</h1>
                <p class="lead fs-5 opacity-75 animate-slide-up animation-delay-1">
                    Login to access your account
                </p>
                <div class="d-none d-md-block mt-4 animate-slide-up animation-delay-2">
                    <i class="bi bi-arrow-right-circle fs-1 opacity-50"></i>
                </div>
            </div>

            <!-- Card / Right Column -->
            <div class="col-lg-5 col-md-6">
                <div class="card glass-card p-4 p-lg-5 animate-fade-in">

                    <h3 class="card-title text-center mb-4 fw-semibold">Sign In</h3>

                    <!-- Login Form -->
                    <form id="loginForm" novalidate>
                        <!-- Email -->
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label fw-medium">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control border-start-0" id="loginEmail"
                                placeholder="you@example.com" required />
                            </div>
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control border-start-0" id="loginPassword"
                                placeholder="Min. 8 characters" required minlength="8" />
                                <button class="btn btn-outline-secondary border-start-0 toggle-password" type="button"
                                data-target="loginPassword">
                                <i class="bi bi-eye-slash"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback">Password must be at least 8 characters.</div>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold btn-hover-gradient">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

                <!-- Register Link -->
                <p class="text-center mt-4 mb-0">
                    Don't have an account?
                    <a href="register.html" class="text-primary fw-semibold text-decoration-none">Register</a>
                </p>

                <!-- Dummy alert placeholder -->
                <div id="loginAlert" class="mt-3"></div>
            </div>
        </div>

    </div>
</div>
</section>

FOOTER
============================================================ -->

    <div class="container">

</body>
</html>
